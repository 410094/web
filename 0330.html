<html>
    <head>
        <title>0330-CSS容器大小及位置</title>
        <style>
            #div {
                margin: 10;
            }
            #d1 {
                width: 0px;
                height: 0px;
                border: 55px solid blue;
                border-color: orange yellow gray greenyellow;
                margin: 10px 5px;
            }
             #d2 {
                width: 100px;
                height: 50px;
                border:  1px solid black;
                margin: 10px 5px;
                padding: 5px 10px;
                box-sizing: content-box;
                border-radius: 50%;
            }
            #d3 {
                width: 1000px;
                height: 1000px;
                border: 1px solid blue;
                position: relative;
            }
            #d31 {
                width: 50px;
                height: 50px;
                border: 1px solid blue;
                position: absolute;
                top: 0px;
                left: 0px;
                background-color: red;
                z-index: 30;
            }
            #d32 {
                width: 50px;
                height: 50px;
                border: 1px solid blue;
                background-color: blue;
                position: absolute;
                top: 10px;
                left: 10px;
                z-index: 30;
            }
             #d4 {
                width: 100px;
                height: 100px;
                border: 5px solid blue;
                position: relative;
                top: 10px;
                left: 10px;
                background-color: dimgray;
                transform: translate(1000px,1000px) rotate(30deg) scale(2 , 0.5);
            }












            #p1 {
                width: 0px;
                height: 0px;
                border: 55px solid blue;
                border-color: white white green white;
                margin: 0px 0px;
                border-top-width: 0px;
                margin: 0 0 0 40;
            }
            #p2 {
                width: 40px;
                height: 0px;
                border: 55px solid blue;
                border-color: white white green white;
                margin: 0px 0px;
                border-top-width: 0px;
                margin: 0 0 0 20;
            }
            #p3 {
                width: 80px;
                height: 0px;
                border: 55px solid blue;
                border-color: white white green white;
                margin: 0px 0px;
                border-top-width: 0px;
            }
            #p4 {
                width: 50px;
                height: 60px;
                background-color: brown;
                margin: 0 0 0 70;
            }


        </style>
    
    </head>
    <body>
        <a href="index.html">回首頁</a>
        <div id="d1">123</div>
        <div id="d2">3333</div>
        <div id="d3">3333
            <div id="d31">3333</div>
            <div id="d32">3333</div>
        </div>
        <div id="d4">3333</div>
        <hr>
        <div id="p1"></div>
        <div id="p2"></div>
        <div id="p3"></div>
        <div id="p4"></div>
        <hr>


    </body>
</html>
