<html>
    <head>
        <title>CSS漸層</title>
        <style>
            div {
                width: 400px;
                height: 500px;
                
            }
            #d1 {
                width: 400px;
                height: 300px;
                background: linear-gradient(135deg, red, yellow);
            }
            #d2 {
                width: 400px;
                height: 400px;
                background: linear-gradient(90deg,red,orange,yellow,green,blue,indigo,purple,pink);
            }
            #d3 {
                width: 400px;
                height: 100px;
                background: linear-gradient(90deg,red 67%,white 90%,blue);

            }
            #d4 {
                background: repeating-linear-gradient(45deg,red 30%,white 35%,green 40%,red 45%);
            }
            #r1 {
                background: radial-gradient(circle, red,orange,yellow,green,blue,pink);
            }
             #r2 {
                background: repeating-radial-gradient(circle, orange 10%,green 20%);
            }
            #c1 {
                background: conic-gradient(red,yellow,green,red);
            }
            #c2 {
                background: repeating-conic-gradient(red 10%,yellow 25%,green 30%,red 60%);
            }


        </style>
    </head>
    <body>
        <a href="index.html">回首頁</a>
        <div id="d1"></div>
        <div id="d2"></div>
        <div id="d3"></div>
        <div id="d4"></div>

        <div id="r1"></div>
        <div id="r2"></div>
        

        <div id="c1"></div>
        <div id="c2"></div>
        </body>
</html>
