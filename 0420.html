<html>
<head>
    <title>0420-javascript輸入輸出</title>
    <script>
        //註解
        function sayhello(){
            ans=prompt("名字?")
            alert("hello"+ans)
            console.log("hello");
            document.getElementById("msg").innerHTML="Hello"+ans;
        }
        function calc() {
            userAns=parseInt(prompt("你覺得是多少?"));

            n1=parseInt(document.getElementById("n1").value);
            n2=parseInt(document.getElementById("n2").value);
            if(isNaN(n1)) n1=0;
            if(isNaN(n2)) n2=0;

            document.getElementById("ans").value="答案是"+(n1+n2);
        }
        function change() {
            document.getElementById("rgn").innerHTML=document.getElementById("rg").value;

        }
    </script>
</head>
<body>
    <button onclick="sayhello()">打招呼</button>

    <div id="msg"></div>
    <hr>
    <input type="text" id="in1"><br>
    <input type="password"><br>
    <input type="number"><br>
    <input type="date"><br>
    <input type="datetime-local"><br>
    <input type="color"><br>
    <input type="range" id="rg" value="0" oninput="change()"; ><span></span><br>
    <hr>
    <input type="number" id="n1"> + <input type="number" id="n2"> = <button onclick="calc();">?</button><br>
    <input type="number" id="ans" disabled>


</body>
</html>
