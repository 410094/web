<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>魔法變身畫布：萬物皆貓！</title>
<style>
    body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background-color: #1e1e24; /* 深藍色背景 */
        color: white;
        margin-top: 20px;
    }
    canvas {
        background-color: #fff;
        border-radius: 10px;
        cursor: crosshair;
        box-shadow: 0 0 30px rgba(0,0,0,0.7);
    }
    p { color: #ccc; margin-bottom: 5px; text-align: center; }
    button {
        margin-top: 15px;
        padding: 12px 25px;
        font-size: 1.1em;
        cursor: pointer;
        background: #fcbf1e; /* 橘黃色按鈕 */
        color: #2a3d45;
        border: none;
        border-radius: 6px;
        font-weight: bold;
    }
    h2 { color: #fcbf1e; margin-bottom: 10px; }
</style>
</head>
<body>

    <h2>🎨 魔法變身畫布：萬物皆貓！ 🎨</h2>
    <p>請「一筆畫」在畫布上畫一個複雜的形狀（越詳細越好，盡量大一點）。</p>
    <p>放開滑鼠，看看魔法如何將它重構成清潔的貓咪！</p>
    
    <canvas id="canvas" width="600" height="500"></canvas>
    <button onclick="reset()">清空重畫</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let isDrawing = false;
        let userPoints = []; // 儲存玩家畫的原始點
        const morphPointsCount = 500; // 統一取樣成 500 個點，捕捉貓咪細節

        // 定義一個詳細的目標「清潔貓咪」 (相對座標 0~100)
        // 這個目標由多個路徑組成，我們將它們合併
        let targetPoints = [];
        const catPaths = [
            // 頭 (橘色描邊，肉色底)
            { color: '#fffef0', pts: [
                {x: 50, y: 15}, {x: 48, y: 16}, {x: 46, y: 18}, {x: 45, y: 20}, {x: 46, y: 22}, 
                {x: 48, y: 24}, {x: 50, y: 25}, {x: 52, y: 24}, {x: 54, y: 22}, {x: 55, y: 20}, 
                {x: 54, y: 18}, {x: 52, y: 16}, {x: 50, y: 15}
            ] },
            // Ears (橘色描邊，肉色底)
            { color: '#fffef0', pts: [ {x: 42, y: 14}, {x: 40, y: 8}, {x: 38, y: 10}, {x: 40, y: 12}, {x: 42, y: 14} ] }, // Left
            { color: '#fffef0', pts: [ {x: 58, y: 14}, {x: 60, y: 8}, {x: 62, y: 10}, {x: 60, y: 12}, {x: 58, y: 14} ] }, // Right
            // Body (橘色描邊，肉色底)
            { color: '#fffef0', pts: [
                {x: 50, y: 25}, {x: 55, y: 26}, {x: 60, y: 27}, {x: 65, y: 26}, {x: 70, y: 28}, 
                {x: 72, y: 48}, {x: 68, y: 50}, {x: 65, y: 48}, {x: 62, y: 45}, 
                {x: 58, y: 48}, {x: 55, y: 50}, {x: 52, y: 48}, {x: 50, y: 45}, 
                {x: 48, y: 48}, {x: 45, y: 50}, {x: 42, y: 48}, {x: 40, y: 45}, 
                {x: 38, y: 48}, {x: 35, y: 50}, {x: 32, y: 48}, {x: 30, y: 25}, 
                {x: 35, y: 28}, {x: 40, y: 27}, {x: 45, y: 26}, {x: 50, y: 25}
            ] },
            // Tail (橘色描邊，肉色底)
            { color: '#fffef0', pts: [
                {x: 70, y: 28}, {x: 72, y: 26}, {x: 74, y: 28}, {x: 72, y: 30}, 
                {x: 70, y: 28}
            ] },
            // Legs (橘色描邊，肉色底)
            { color: '#fffef0', pts: [ {x: 40, y: 45}, {x: 42, y: 46}, {x: 40, y: 47}, {x: 38, y: 46}, {x: 40, y: 45} ] }, // Left
            { color: '#fffef0', pts: [ {x: 60, y: 45}, {x: 62, y: 46}, {x: 60, y: 47}, {x: 58, y: 46}, {x: 60, y: 45} ] }, // Right
            // 五官 (黑色描邊)
            { color: '#000000', pts: [ {x: 48, y: 19}, {x: 49, y: 19}, {x: 49, y: 18}, {x: 48, y: 18}, {x: 48, y: 19} ] }, // Left Eye
            { color: '#000000', pts: [ {x: 52, y: 19}, {x: 53, y: 19}, {x: 53, y: 18}, {x: 52, y: 18}, {x: 52, y: 19} ] }, // Right Eye
            { color: '#000000', pts: [ {x: 50, y: 21}, {x: 51, y: 22}, {x: 50, y: 23}, {x: 49, y: 22}, {x: 50, y: 21} ] }, // Nose
            { color: '#000000', pts: [ {x: 48, y: 23}, {x: 49, y: 23}, {x: 51, y: 23}, {x: 52, y: 23}, {x: 50, y: 24}, {x: 48, y: 23} ] } // Mouth
        ];

        // 將所有多路徑的目標點合併
        let mergedTargetShape = [];
        catPaths.forEach(path => {
            mergedTargetShape.push(...resamplePath(path.pts, morphPointsCount / catPaths.length, path.color));
        });
        // 確保點數為 morphPointsCount
        while(mergedTargetShape.length < morphPointsCount) {
            mergedTargetShape.push({x: mergedTargetShape[0].x, y: mergedTargetShape[0].y, color: mergedTargetShape[0].color});
        }
        
        canvas.addEventListener('mousedown', (e) => {
            if (isDrawing) return;
            isDrawing = true;
            userPoints = [];
            userPoints.push(getMousePos(e));
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            userPoints.push(pos);
            drawPoints(userPoints, '#3a86ff'); // 畫出玩家的藍色線條
        });

        window.addEventListener('mouseup', () => {
            if (!isDrawing || userPoints.length < 5) {
                isDrawing = false;
                return;
            }
            isDrawing = false;
            startMorphing(); // 啟動真正的變形運算
        });

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        // 修改的繪製線條函數，可以根據點位顏色繪製
        function drawPoints(pts, color) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(pts.length === 0) return;
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            
            // 如果點位有自己的顏色 (變形後期)
            if (pts[0].color) {
                for (let i = 1; i < pts.length; i++) {
                    ctx.beginPath();
                    ctx.moveTo(pts[i-1].x, pts[i-1].y);
                    ctx.lineTo(pts[i].x, pts[i].y);
                    ctx.strokeStyle = pts[i].color;
                    ctx.lineWidth = 4;
                    ctx.lineJoin = 'round';
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
            } else {
                // 如果是玩家草稿 (單色)
                for (let i = 1; i < pts.length; i++) {
                    ctx.lineTo(pts[i].x, pts[i].y);
                }
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        function startMorphing() {
            // 1. 取得玩家畫圖的邊界框
            const box = getBoundingBox(userPoints);
            
            // 2. 重新取樣玩家的線條為 morphPointsCount 個均勻的點
            const startShape = resamplePath(userPoints, morphPointsCount, '#3a86ff');
            
            // 3. 把「終極貓咪」的合併座標放大並平移到玩家剛剛畫圖的範圍內，並重新取樣
            let scaledCat = mergedTargetShape.map(p => ({
                x: box.x + (p.x / 100) * box.width,
                y: box.y + (p.y / 100) * box.height,
                color: p.color
            }));
            const targetShape = resamplePath(scaledCat, morphPointsCount, '#fcbf1e'); // 終點顏色僅供過渡使用
            
            // 4. 開始執行動畫
            let startTime = null;
            const duration = 2500; // 變形時間延長至 2.5 秒，以便觀察細節

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = (timestamp - startTime) / duration;
                if (progress > 1) progress = 1;

                // 使用 easeInOut 讓動畫更平滑
                let easeProgress = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;

                // 計算這一幀的中間狀態點位 (Lerp 線性插值)
                let currentShape = [];
                for (let i = 0; i < morphPointsCount; i++) {
                    let c = startShape[i].color; // 草稿藍色
                    // 在動畫後期將顏色也進行 Lerp，從藍色漸變到目標多色
                    if (progress > 0.8) {
                        c = mergedTargetShape[i].color; // 直接使用目標路徑顏色
                    } else if (progress > 0.6) {
                        // 顏色插值從藍色漸變到目標顏色
                        c = lerpColor(startShape[i].color, mergedTargetShape[i].color, (progress - 0.6) / 0.2);
                    }
                    
                    currentShape.push({
                        x: startShape[i].x + (scaledCat[i].x - startShape[i].x) * easeProgress,
                        y: startShape[i].y + (scaledCat[i].y - startShape[i].y) * easeProgress,
                        color: c
                    });
                }

                // 畫出變形中的線條
                drawPoints(currentShape, progress < 0.8 ? '#3a86ff' : '#fcbf1e');

                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }
            requestAnimationFrame(animate);
        }

        // --- 核心數學：路徑等距重採樣 (讓任何形狀都能變成 指定點數，並可以處理顏色) ---
        function resamplePath(points, numPoints, resampledColor) {
            let pathLength = 0;
            let lengths = [0];
            for (let i = 1; i < points.length; i++) {
                let dx = points[i].x - points[i-1].x;
                let dy = points[i].y - points[i-1].y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                pathLength += dist;
                lengths.push(pathLength);
            }

            let resampled = [];
            resampled.push({x: points[0].x, y: points[0].y, color: points[0].color || resampledColor}); // 起點
            let interval = pathLength / (numPoints - 1);
            let currentDist = interval;

            for (let i = 1; i < points.length; i++) {
                while (lengths[i] >= currentDist && resampled.length < numPoints - 1) {
                    let segmentLength = lengths[i] - lengths[i-1];
                    let leftover = currentDist - lengths[i-1];
                    let ratio = leftover / segmentLength;
                    
                    let newX = points[i-1].x + ratio * (points[i].x - points[i-1].x);
                    let newY = points[i-1].y + ratio * (points[i].y - points[i-1].y);
                    resampled.push({x: newX, y: newY, color: points[i-1].color || resampledColor});
                    currentDist += interval;
                }
            }
            resampled.push({x: points[points.length-1].x, y: points[points.length-1].y, color: points[points.length-1].color || resampledColor}); // 終點
            while(resampled.length < numPoints) resampled.push({x: resampled[resampled.length-1].x, y: resampled[resampled.length-1].y, color: resampled[resampled.length-1].color});
            return resampled;
        }

        function getBoundingBox(pts) {
            let minX = pts[0].x, maxX = pts[0].x, minY = pts[0].y, maxY = pts[0].y;
            for (let p of pts) {
                if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
            }
            return { x: minX, y: minY, width: Math.max(maxX - minX, 50), height: Math.max(maxY - minY, 50) };
        }

        // 簡單的顏色線性插值，處理 hex 顏色
        function lerpColor(color1, color2, ratio) {
            // 解析 Hex 顏色為 rgb
            const rgb1 = hexToRgb(color1);
            const rgb2 = hexToRgb(color2);
            // 進行插值
            const r = Math.round(rgb1.r + (rgb2.r - rgb1.r) * ratio);
            const g = Math.round(rgb1.g + (rgb2.g - rgb1.g) * ratio);
            const b = Math.round(rgb1.b + (rgb2.b - rgb1.b) * ratio);
            // 將 rgb 轉回 Hex
            return rgbToHex(r, g, b);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return {r, g, b};
        }

        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function reset() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            userPoints = [];
        }
    </script>
</body>
</html>
