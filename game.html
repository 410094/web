<!DOCTYPE html>

//made by Dingo

<html>
    <head>
        <title>二選一</title>
        <style>
            body {
                margin: 0;
                font-family: sans-serif;
                text-align: center; 
                background-color: white;
            }
            .button {
                margin: 20px;
                cursor: pointer; 
                border-radius: 10px; 
                transition: transform 0.1s; 
            }

            #b1 {
                height: 100px;
                width: 100px;
                background: red; 
            }
            #b2 {
                height: 100px;
                width: 100px;
                background: blue;
            }
            .container {
                display: flex;
                align-items: center;
                height: 60vh;
                justify-content: center;
            }
            #info {
                margin-top: 50px;
                font-size: 24px;
                font-weight: bold;
                color: black;
            }
        </style>
        <script>
            var correct;
            var score = 0; 

            function getRand(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function game_start() {
                score = 0; 
                update_info("請憑直覺選一個方塊。分數： " + score);
                correct = getRand(1, 2); 
            }

            function game_stop() {
                alert("遊戲結束！\n你的分數是：" + score);
                game_start(); 
            }

            function next(ans) {
                if (ans === correct) {
                    score++; 
                    update_info("選對了！繼續挑戰。目前分數： " + score);
                    correct = getRand(1, 2); 
                } else {
                    game_stop(); 
                }
            }

            function update_info(text) {
                document.getElementById("info").innerText = text;
            }

            window.onload = function() {
                game_start();
            };
        </script>
    </head>
    <body>
        <div id="info">準備中...</div>
        
        <div class="container">
            <div id="b1" class="button" onclick="next(1);"></div>
            <div id="b2" class="button" onclick="next(2);"></div>
        </div>
    </body>
</html>
