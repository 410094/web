<html>
    <head>
        <title>0427</title>
        <style>
            .dv{
                display: inline-block;
                width: 100px;
                height: 80px;
                margin: 10px;
                border: 1px solid black;
                border-radius: 5px;
            }
            .selected {
                border-color: red;
                border-width: 2px;
                box-shadow: 0px 0px 5px;

            }
            .selected-one {
                border-color: red;
                border-width: 5px;
                box-shadow: 0px 0px 5px;

            }
            
        </style>
        <script>
            function toggle(elm) {
                if(elm.classList.contains("selected")) {
                    elm.classList.remove("selected");
                } else {
                    elm.classList.add("selected");
                }
            }
            function setColor() {
                //document.getElementById("d1").style.backgroundColor=event.target.value;
                //document.getElementById("d1").innerHTML=event.target.value;
                Array.from(document.getElementsByClassName("selected")).forEach((a)=>{
                    a.style.backgroundColor=event.target.value;
                    a.classList.remove("selected");
                })
            }
            //-----------------------------------------------------------------------------
            my={elm:null};
            function choose(elm) {
                if(my.elm != null) {
                    my.elm.classList.remove("selected-one")
                }
                elm.classList.add("selected-one");
                my.elm=elm;
            }
            function setOneColor() {
                my.elm.style.backgroundColor=event.target.value;
            }
            function setRound() {
                my.elm.style.borderRadius = event.target.value + "px";
            }


        </script>
    </head>
    <body>
        <div class="dv" onclick="toggle(this);"></div>
        <div class="dv" onclick="toggle(this);"></div>
        <div class="dv" onclick="toggle(this);"></div>
        <div class="dv" onclick="toggle(this);"></div>
        <div>
            <input type="color" oninput="setColor();">
        </div>
        <hr>
        <div class="dv" id="d1" onclick="choose(this);"></div>
        <div class="dv" id="d2" onclick="choose(this);"></div>
        <div class="dv" id="d3" onclick="choose(this);"></div>
        <div class="dv" id="d4" onclick="choose(this);"></div>
        <div> 
            <input type="color" oninput="setOneColor();">
            <input type="range" max="50" onput="setRound">
        </div>


    </body>
</html>
